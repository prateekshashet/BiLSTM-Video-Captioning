data:
  batch_size: 1
  frame_sampling: motion
  mean:
  - 0.485
  - 0.456
  - 0.406
  num_frames: 8
  num_workers: 0
  root_dir: training videos
  std:
  - 0.229
  - 0.224
  - 0.225
  temporal_stride: 1
  train_annotations: annotations/train_annotations.json
  val_annotations: annotations/val_annotations.json
logging:
  log_interval: 10
  output_root: outputs
model:
  bidirectional: true
  cnn_backbone: resnet50
  dropout: 0.4
  embed_dim: 512
  hidden_dim: 512
  input_dim: 2048
  num_layers: 2
  object_feat_dim: 1024
  use_transformer: true
  vocab_size: 10000
paths:
  checkpoints_dir: outputs/checkpoints
  logs_dir: outputs/logs
  output_dir: outputs
sanity_check:
  enabled: true
  output_dir: outputs/sanity
  sample_videos: 2
training:
  batch_size: 2
  clip_grad_norm: 5.0
  coverage_weight: 0.1
  epochs: 80
  grounding_weight: 0.3
  label_smoothing: 0.0
  learning_rate: 3e-4
  lr_scheduler:
    gamma: 0.1
    min_lr: 1e-6
    step_size: 20
    type: cosine
  max_grad_norm: 5.0
  mixed_precision: false
  scheduled_sampling:
    end_epoch: 40
    final_ratio: 0.5
    start_epoch: 5
  use_scheduled_sampling: true
  weight_decay: 1e-4
yolo:
  augmentations:
    fliplr: 0.5
    flipud: 0.0
    hsv_h: 0.015
    hsv_s: 0.5
    hsv_v: 0.3
    mixup: 0.1
    mosaic: true
    perspective: 0.0
    scale: 0.5
    translate: 0.1
  cache: false
  confidence_threshold: 0.4
  finetune:
    annotations: yolo_finetune/annotations.yaml
    batch_size: 8
    best_weights: checkpoints/yolo/yolo_best.pt
    enabled: false
    epochs: 20
    frames_dir: yolo_finetune/frames
    img_size: 640
    learning_rate: 1e-4
    output_dir: checkpoints/yolo
    patience: 5
  iou_threshold: 0.45
  model: yolov8m
  weights: checkpoints/yolo/yolo_best.pt
